name: Atualizar Dados Econômicos

on:
  schedule:
    # De segunda a sexta, às 21:00 UTC (18:00 BRT)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Buscar cotações (PTAX)
        run: cd scripts && python fetch_moedas.py

      - name: Buscar Selic
        run: cd scripts && python fetch_selic.py

      - name: Buscar CDI
        run: cd scripts && python fetch_cdi.py

      - name: Buscar IPCA
        run: cd scripts && python fetch_ipca.py

      - name: Buscar IGP-M
        run: cd scripts && python fetch_igpm.py

      - name: Buscar INPC
        run: cd scripts && python fetch_inpc.py

      - name: Buscar Poupança
        run: cd scripts && python fetch_poupanca.py

      - name: Commit dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: atualizar dados $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
